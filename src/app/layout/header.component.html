<mat-toolbar class="header-toolbar">
      <button mat-icon-button class="hide-desktop" (click)="menuToggle.emit()" aria-label="Menu">
        <mat-icon>menu</mat-icon>
      </button>

      @if (branchContext.multiBranch()) {
        <mat-form-field appearance="outline" class="branch-select hide-mobile" subscriptSizing="dynamic">
          <mat-label>Branch</mat-label>
          <mat-select
            [ngModel]="branchContext.selectedBranchId()"
            (ngModelChange)="onBranchChange($event)"
          >
            @for (b of branchContext.branches(); track b.id) {
              <mat-option [value]="b.id">{{ b.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      } @else if (branchContext.selectedBranch()) {
        <span class="branch-label hide-mobile">{{ branchContext.selectedBranch()!.name }}</span>
      }

      <span class="spacer"></span>

      <button mat-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
        <span class="hide-mobile">{{ auth.user()?.fullName }}</span>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item disabled>
          <mat-icon>email</mat-icon>
          <span>{{ auth.user()?.email }}</span>
        </button>
        <button mat-menu-item (click)="auth.logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>
