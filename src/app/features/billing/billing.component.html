<div class="page-header">
      <div>
        <h1>Billing</h1>
        <p>Invoices and payments</p>
      </div>
      <a mat-flat-button color="primary" routerLink="/billing/payment">
        <mat-icon>payments</mat-icon> Record payment
      </a>
    </div>

    <mat-tab-group>
      <mat-tab label="Invoices">
        <table mat-table [dataSource]="invoices()" class="full-width mt-16">
          <ng-container matColumnDef="number"><th mat-header-cell *matHeaderCellDef>Invoice</th><td mat-cell *matCellDef="let i">{{ i.invoiceNumber }}</td></ng-container>
          <ng-container matColumnDef="member"><th mat-header-cell *matHeaderCellDef>Member</th><td mat-cell *matCellDef="let i">{{ i | memberLabel }}</td></ng-container>
          <ng-container matColumnDef="total"><th mat-header-cell *matHeaderCellDef>Total</th><td mat-cell *matCellDef="let i">{{ i.totalMinor | currencyMinor }}</td></ng-container>
          <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let i"><app-status-badge [status]="i.status" /></td></ng-container>
          <tr mat-header-row *matHeaderRowDef="invCols"></tr>
          <tr mat-row *matRowDef="let row; columns: invCols"></tr>
        </table>
      </mat-tab>
      <mat-tab label="Payments">
        <table mat-table [dataSource]="payments()" class="full-width mt-16">
          <ng-container matColumnDef="number"><th mat-header-cell *matHeaderCellDef>Payment</th><td mat-cell *matCellDef="let p">{{ p.paymentNumber }}</td></ng-container>
          <ng-container matColumnDef="member"><th mat-header-cell *matHeaderCellDef>Member</th><td mat-cell *matCellDef="let p">{{ p | memberLabel }}</td></ng-container>
          <ng-container matColumnDef="amount"><th mat-header-cell *matHeaderCellDef>Amount</th><td mat-cell *matCellDef="let p">{{ p.amountMinor | currencyMinor }}</td></ng-container>
          <ng-container matColumnDef="method"><th mat-header-cell *matHeaderCellDef>Method</th><td mat-cell *matCellDef="let p">{{ p.method }}</td></ng-container>
          <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let p"><app-status-badge [status]="p.status" /></td></ng-container>
          <tr mat-header-row *matHeaderRowDef="payCols"></tr>
          <tr mat-row *matRowDef="let row; columns: payCols"></tr>
        </table>
      </mat-tab>
    </mat-tab-group>
