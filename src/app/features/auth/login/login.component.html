<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header class="login-header">
      <div class="login-header-text">
        <mat-card-title>{{ appName }}</mat-card-title>
        <mat-card-subtitle>Staff sign in</mat-card-subtitle>
      </div>
      <mat-icon class="brand-icon" aria-hidden="true">fitness_center</mat-icon>
    </mat-card-header>
    <mat-card-content class="login-content">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field
          appearance="outline"
          floatLabel="always"
          subscriptSizing="dynamic"
          class="full-width"
        >
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="username" />
          <app-field-error [control]="form.controls.email" label="Email" />
        </mat-form-field>
        <mat-form-field
          appearance="outline"
          floatLabel="always"
          subscriptSizing="dynamic"
          class="full-width"
        >
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <app-field-error [control]="form.controls.password" label="Password" />
        </mat-form-field>
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <button mat-flat-button color="primary" class="full-width submit-btn" [disabled]="loading()">
          @if (loading()) {
            <mat-spinner diameter="20" />
          } @else {
            Sign in
          }
        </button>
      </form>
      @if (useMock) {
        <p class="demo-hint">
          Demo: reception&#64;gym.com / password · admin&#64;gym.com / password
        </p>
      }
    </mat-card-content>
  </mat-card>
</div>
